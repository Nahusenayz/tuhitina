<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tihtina Guest Platform - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <a href="dashboard.html" class="logo"><i class="fas fa-chevron-left"></i> PROFILE</a>
        <div class="lang-switch">አማርኛ</div>
    </header>

    <div class="container fade-in">
        <div class="text-center mt-2">
            <div style="width: 100px; height: 100px; background: #ddd; border-radius: 50%; margin: 0 auto; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; color: #666;">
                <i class="fas fa-user-edit"></i>
            </div>
            <h2 class="mt-1">Guest User</h2>
            <p>guest@example.com</p>
        </div>

        <div class="card mt-2">
            <h3>Personal Information</h3>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" value="Guest User">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" class="form-control" value="+251 91 234 5678">
            </div>
            <button class="btn btn-primary btn-block">Save Changes</button>
        </div>

        <div class="card">
            <h3>Security</h3>
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" class="form-control" value="********" readonly>
            </div>
            <button class="btn btn-outline btn-block">Change Password</button>
        </div>

        <a href="settings.html" class="btn btn-outline btn-block mt-2" data-i18n="settings">Settings</a>
    </div>

    <nav class="bottom-nav">
        <!-- Bottom Nav Bar -->
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span data-i18n="home">Home</span>
        </a>
        <a href="hotels.html" class="nav-item">
            <i class="fas fa-hotel"></i>
            <span data-i18n="hotels">Hotels</span>
        </a>
        <a href="experiences.html" class="nav-item">
            <i class="fas fa-map-marked-alt"></i>
            <span data-i18n="experiences">Experiences</span>
        </a>
        <a href="my-bookings.html" class="nav-item">
            <i class="fas fa-calendar-check"></i>
            <span data-i18n="bookings">Bookings</span>
        </a>
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-user-circle"></i>
            <span data-i18n="dashboard">Dashboard</span>
        </a>
    </nav>

    <script type="module">
        import api from './js/api.js';
        import lang from './js/lang.js';
        import './js/app.js';
    </script>
</body>
</html>
