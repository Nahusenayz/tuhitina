<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tihtina Guest Platform - Emergency</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="background-color: #fff0f0;">
    <!-- Emergency Header -->
    <header style="background: var(--error); color: white; border: none; backdrop-filter: none;">
        <div class="header-logo">
            <button onclick="history.back()" style="background: none; border: none; color: white; cursor: pointer;">
                <i class="fas fa-chevron-left" style="font-size: 20px;"></i>
            </button>
            <h1 class="font-display" style="color: white; margin-left: 12px;" data-i18n="emergency_mode">Emergency Mode</h1>
        </div>
        <div style="background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: var(--radius-full); font-size: 12px; font-weight: 700;">ACTIVE</div>
    </header>

    <main class="container fade-in">
        <!-- Location Map Section -->
        <section class="mb-2">
            <div class="card" style="padding: 0; overflow: hidden; height: 220px; position: relative; border-radius: var(--radius-xl); border: 2px solid var(--error);">
                <img src="https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=800&q=80" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.8;" alt="Map">
                <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(0deg, rgba(186, 26, 26, 0.4), transparent);"></div>
                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
                    <div style="width: 48px; height: 48px; background: var(--error); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--error);">
                        <i class="fas fa-map-marker-alt" style="color: white; font-size: 24px;"></i>
                    </div>
                </div>
                <div style="position: absolute; bottom: 16px; left: 16px; right: 16px; background: rgba(255,255,255,0.95); padding: 12px 16px; border-radius: 12px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow);">
                    <div style="width: 32px; height: 32px; background: var(--surface-container-high); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-location-arrow" style="color: var(--primary-color); font-size: 14px;"></i>
                    </div>
                    <div>
                        <p class="text-xs uppercase font-bold" style="color: var(--outline);">Current Elevation • Sheraton Addis</p>
                        <p class="text-sm font-bold">Addis Ababa, Ethiopia</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Quick Access Grid -->
        <section class="grid" style="grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px;">
            <div class="card" style="padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 0;" onclick="window.location.href='tel:991'">
                <i class="fas fa-shield-alt" style="color: var(--error); font-size: 24px;"></i>
                <span style="font-weight: 700; font-size: 14px;" data-i18n="police">Police</span>
            </div>
            <div class="card" style="padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 0;" onclick="window.location.href='tel:992'">
                <i class="fas fa-ambulance" style="color: var(--error); font-size: 24px;"></i>
                <span style="font-weight: 700; font-size: 14px;" data-i18n="ambulance">Ambulance</span>
            </div>
            <div class="card" style="padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 0;">
                <i class="fas fa-phone-alt" style="color: var(--primary-color); font-size: 24px;"></i>
                <span style="font-weight: 700; font-size: 14px;" data-i18n="reception">Reception</span>
            </div>
            <div class="card" style="padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 0;">
                <i class="fas fa-info-circle" style="color: var(--primary-color); font-size: 24px;"></i>
                <span style="font-weight: 700; font-size: 14px;" data-i18n="instructions">Instructions</span>
            </div>
        </section>

        <!-- Large SOS Button -->
        <section style="text-align: center; margin-bottom: 32px;">
            <button class="card" style="margin: 0 auto; width: 180px; height: 180px; border-radius: 50%; background: var(--error); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; border: 8px solid rgba(186, 26, 26, 0.1); box-shadow: 0 0 0 16px rgba(186, 26, 26, 0.05); cursor: pointer;">
                <i class="fas fa-fingerprint" style="font-size: 40px;"></i>
                <span style="font-weight: 800; font-size: 18px; letter-spacing: 0.1em;">ACTIVATE SOS</span>
                <span style="font-size: 10px; opacity: 0.8;">HOLD FOR 3 SECONDS</span>
            </button>
        </section>

        <!-- Nearest Hospitals -->
        <section class="mt-2">
            <h3 style="font-size: 1.25rem; margin-bottom: 16px;" data-i18n="nearest_hospitals">Nearest Hospitals</h3>
            <div class="card" style="padding: 16px; display: flex; gap: 16px; align-items: center; margin-bottom: 12px;">
                <div style="width: 48px; height: 48px; background: #ffebee; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-hospital" style="color: var(--error);"></i>
                </div>
                <div style="flex: 1;">
                    <h4 style="font-size: 14px;">Black Lion Hospital</h4>
                    <p class="text-xs" style="color: var(--outline);">1.5 km • Emergency Open 24/7</p>
                </div>
                <button class="btn btn-outline" style="padding: 8px 12px; font-size: 10px;">NAVIGATE</button>
            </div>
        </section>
    </main>

    <!-- Floating Navigation -->
    <nav class="floating-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
        </a>
        <a href="hotels.html" class="nav-item">
            <i class="fas fa-concierge-bell"></i>
        </a>
        <a href="experiences.html" class="nav-item">
            <i class="fas fa-map-marked-alt"></i>
        </a>
        <a href="my-bookings.html" class="nav-item">
            <i class="fas fa-calendar-check"></i>
        </a>
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-user-circle"></i>
        </a>
    </nav>

    <script type="module">
        import api from './js/api.js';
        import lang from './js/lang.js';
        import './js/app.js';

        window.handleShareLocation = () => {
            alert('Sharing location with hotel admin and emergency contacts...');
        };

        window.sendAlert = async () => {
            if(confirm('This will send a high-priority alert to the hotel staff. Proceed?')) {
                await window.api.sendEmergencyAlert({type: 'manual', location: 'Room 305'});
                alert('Alert sent! Staff are on their way.');
            }
        };
    </script>
</body>
</html>
