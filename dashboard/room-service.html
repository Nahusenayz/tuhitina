<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tihtina Guest Platform - Room Service</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <a href="dashboard.html" class="logo"><i class="fas fa-chevron-left"></i> ROOM SERVICE</a>
        <div class="lang-switch">አማርኛ</div>
    </header>

    <div class="container fade-in">
        <h1 data-i18n="room_service">Room Service</h1>
        <p>Order delicious Ethiopian and international cuisine to your room.</p>

        <div id="services-container">
            <p class="text-center">Loading menu...</p>
        </div>

        <div id="order-summary" class="card mt-2" style="display: none; border: 2px solid var(--secondary-color);">
            <h3>Your Order</h3>
            <div id="order-items"></div>
            <hr style="margin: 10px 0;">
            <div style="display: flex; justify-content: space-between; font-weight: bold;">
                <p>Total</p>
                <p id="order-total">0 ETB</p>
            </div>
            <button class="btn btn-primary btn-block mt-1" onclick="placeOrder()">Place Order</button>
        </div>
    </div>

    <script type="module">
        import api from './js/api.js';
        import lang from './js/lang.js';
        import './js/app.js';

        let order = [];
        const container = document.getElementById('services-container');

        async function loadServices() {
            try {
                const services = await api.getServices();
                if (!services || services.length === 0) {
                    container.innerHTML = '<p class="text-center">No services available right now.</p>';
                    return;
                }

                container.innerHTML = services.map(service => `
                    <div class="card mt-2">
                        <div style="display: flex; gap: 15px; align-items: center;">
                            <img src="${service.image_url}" alt="${service.name}" style="width: 80px; height: 80px; border-radius: 8px; object-fit: cover;">
                            <div style="flex: 1;">
                                <h3 style="font-size: 1rem;">${service.name}</h3>
                                <p class="text-sm" style="color: var(--on-surface-variant);">${service.category}</p>
                                <p class="price">${new Intl.NumberFormat().format(service.price)} ETB</p>
                            </div>
                            <button class="btn btn-primary" onclick="addToOrder('${service.name}', ${service.price})">+</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading services:', error);
                container.innerHTML = '<p class="text-center">Error loading menu.</p>';
            }
        }

        window.addToOrder = (name, price) => {
            order.push({name, price});
            updateSummary();
        };

        function updateSummary() {
            const summary = document.getElementById('order-summary');
            const items = document.getElementById('order-items');
            const total = document.getElementById('order-total');
            
            if (order.length > 0) {
                summary.style.display = 'block';
                items.innerHTML = order.map(i => `<p style="display:flex; justify-content:space-between;"><span>${i.name}</span> <span>${i.price} ETB</span></p>`).join('');
                total.innerText = new Intl.NumberFormat().format(order.reduce((sum, i) => sum + i.price, 0)) + ' ETB';
            }
        }

        window.placeOrder = () => {
            alert('Order placed successfully! It will be delivered to your room in 20 minutes.');
            order = [];
            document.getElementById('order-summary').style.display = 'none';
        };

        loadServices();
    </script>
</body>
</html>
